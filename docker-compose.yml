# Optional in P0 — the default dev DB is SQLite (no Docker needed).
# Bring these up when you want the true-to-plan Postgres/Redis path, then set
# DATABASE_URL=postgresql+psycopg://mcos:mcos@localhost:5432/mcos in your .env.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: mcos
      POSTGRES_PASSWORD: mcos
      POSTGRES_DB: mcos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcos"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data:
