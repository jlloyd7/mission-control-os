name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Tests
        run: pytest -q
      - name: Alembic upgrade (fresh SQLite)
        env:
          DATABASE_URL: "sqlite:///./ci.db"
        run: alembic upgrade head

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm --filter web exec tsc --noEmit
      - name: Build
        run: pnpm --filter web build

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for leaked provider keys / tokens
        run: |
          if grep -rInE 'sk-ant-[A-Za-z0-9_-]+|sk-[A-Za-z0-9]{20,}|(OPENAI|ANTHROPIC)_API_KEY=[^[:space:]]|ghp_[A-Za-z0-9]{20,}|xox[baprs]-' \
            --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=.venv --exclude-dir=.next . ; then
            echo "::error::Potential secret detected"; exit 1
          else
            echo "No secrets found."; exit 0
          fi
